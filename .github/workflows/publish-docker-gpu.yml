name: Publish Docker GPU Images

on:
  push:
    paths-ignore:
      - 'README.md'
    branches:
    - master
    tags:
    - v*

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 2880
    steps:
    - name: Checkout
      uses: actions/checkout@v2
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v1
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1
    - name: Login to DockerHub
      uses: docker/login-action@v1 
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build and push Docker image
      id: docker_build
      uses: docker/build-push-action@v2
      with:
        file: ./gpu.Dockerfile
        platforms: linux/amd64
        push: true
        no-cache: true
        tags: webodm/odx:gpu
    # Trigger NodeODX build
    - name: Dispatch NodeODX Build Event
      id: nodeodx_dispatch
      run: |
        curl -X POST -u "${{secrets.PAT_USERNAME}}:${{secrets.PAT_TOKEN}}" -H "Accept: application/vnd.github.everest-preview+json" -H "Content-Type: application/json" https://api.github.com/repos/WebODM/NodeODX/actions/workflows/publish-docker-gpu.yml/dispatches --data '{"ref": "master"}'
